<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор бюджета на маркетинг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Шаг 1: Выручка и ниша -->
        <div id="step1" class="step active">
            <h2>Калькулятор бюджета</h2>
            <p class="step-description">Рассчитайте рекламный бюджет и стоимость сайта под ваши цели</p>
            
            <div class="form-group">
                <label for="revenue">🎯 Желаемая выручка в месяц (руб):</label>
                <input type="text" id="revenue" class="form-control" placeholder="Например: 500000" inputmode="numeric">
            </div>
            
            <div class="form-group">
                <label for="niche">🏢 Ниша бизнеса:</label>
                <select id="niche" class="form-control">
                    <option value="ecommerce">🛍️ Интернет-магазин (товары)</option>
                    <option value="services">🔧 Услуги B2C (ремонт, клининг, красота)</option>
                    <option value="b2b">🏭 B2B / Оптовые продажи</option>
                    <option value="development">💻 Разработка / IT / Агентства</option>
                    <option value="medicine">🏥 Медицина / Стоматология</option>
                    <option value="realestate">🏠 Недвижимость / Строительство</option>
                </select>
            </div>
            
            <div class="info-box">
                <small>💡 Выберите нишу — от этого зависит цена клика и конверсия</small>
            </div>
            
            <button onclick="nextStep(2)" class="btn-primary">Далее →</button>
        </div>
        
        <!-- Шаг 2: Средний чек и ЧЕКБОКС -->
        <div id="step2" class="step">
            <h2>📊 Параметры бизнеса</h2>
            <p class="step-description">Уточним детали для точного расчёта</p>
            
            <div class="form-group">
                <label for="averageOrder">💵 Средний чек (руб):</label>
                <input type="text" id="averageOrder" class="form-control" placeholder="Например: 5000" inputmode="numeric">
                <small class="hint" id="checkHint"></small>
            </div>
            
            <!-- НОВОЕ: Чекбокс вместо выпадающего списка -->
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="needEcommerce" class="checkbox-modern">
                    <span class="checkbox-text">🛒 Нужен интернет-магазин (продаю товары онлайн)</span>
                </label>
                <small class="hint" style="margin-top: 8px; display: block;">Если продаёте услуги или работы — оставьте пустым</small>
            </div>
            
            <div class="button-group">
                <button onclick="prevStep(1)" class="btn-secondary">← Назад</button>
                <button onclick="calculate()" class="btn-primary">📊 Рассчитать</button>
            </div>
        </div>

        <!-- Шаг 3: Результаты -->
        <div id="step3" class="step">
            <h2>Результаты расчёта</h2>
            <div id="results"></div>
            <button onclick="restart()" class="btn-primary full-width">🔄 Сделать новый расчёт</button>
        </div>
    </div>
    
    <script src="app2.js"></script>
</body>
</html>
