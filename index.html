<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор бюджета</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="step1" class="step active">
            <h2>💰 Калькулятор бюджета</h2>
            <p>Введите желаемую месячную выручку (руб):</p>
            <input type="number" id="revenue" placeholder="Например: 300000">
            <div class="form-group">
    <label>Ниша бизнеса:</label>
    <select id="niche" class="form-control">
        <option value="ecommerce">Интернет-магазин</option>
        <option value="services">Услуги B2C</option>
        <option value="b2b">B2B продажи</option>
        <option value="development">Разработка / IT</option>
        <option value="medicine">Медицина</option>
        <option value="realestate">Недвижимость</option>
    </select>
</div>
            <button onclick="nextStep(2)">Далее</button>
        </div>

        <div id="step2" class="step">
            <h2>📊 Средний чек</h2>
            <p>Введите средний чек заказа (руб):</p>
            <input type="number" id="averageOrder" placeholder="Например: 5000">
            <div class="form-group">
    <label>Тип сайта:</label>
    <select id="siteType" class="form-control">
        <option value="landing">Лендинг</option>
        <option value="multiPage">Многостраничный сайт</option>
        <option value="ecommerce">Интернет-магазин</option>
        <option value="portal">Портал / Маркетплейс</option>
    </select>
</div>
            <button onclick="prevStep(1)">Назад</button>
            <button onclick="calculate()">Рассчитать</button>
        </div>

        <div id="step3" class="step">
            <h2>🎯 Результаты расчёта</h2>
            <div id="results"></div>
            <button onclick="restart()">Сделать новый расчёт</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
